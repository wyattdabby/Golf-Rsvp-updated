<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Michael D Annual Golf Tournament 2026 — RSVPs</title>
<style>
  :root{
    --green:#1f7a4d; --green-dark:#16623c; --green-soft:#e8f3ec;
    --ink:#1c2421; --muted:#6b7770; --line:#e2e7e4; --bg:#f4f7f5; --card:#fff;
    --amber:#b8860b; --shadow:0 1px 2px rgba(16,40,28,.06),0 6px 20px rgba(16,40,28,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px 56px}
  .hero{background:linear-gradient(160deg,var(--green) 0%,var(--green-dark) 100%);color:#fff;
    border-radius:0 0 20px 20px;padding:30px 26px 26px;margin-bottom:22px}
  .hero h1{margin:0 0 6px;font-size:24px;letter-spacing:-.02em}
  .hero .meta{font-size:14px;opacity:.92;line-height:1.6}
  .hero .meta b{font-weight:600}
  .updated{font-size:12px;opacity:.8;margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .updated button{font:inherit;font-size:12px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
    color:#fff;border-radius:8px;padding:4px 10px;cursor:pointer}
  .updated button:hover{background:rgba(255,255,255,.26)}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
  .card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .card .value{font-size:25px;font-weight:650;margin-top:5px;letter-spacing:-.02em}
  .card.good .value{color:var(--green)}
  h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:26px 0 12px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h2.sec .sec-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .btn{font:inherit;font-size:12.5px;font-weight:600;border-radius:9px;padding:6px 12px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--green-dark)}
  .btn:hover{background:var(--green-soft)}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff}
  .btn.primary:hover{background:var(--green-dark)}
  .btn.gold{background:var(--amber);border-color:var(--amber);color:#fff}
  .btn.gold:hover{filter:brightness(1.07)}
  .btn.mini{font-size:11.5px;padding:3px 9px;border-radius:7px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);
    padding:11px 16px;border-bottom:1px solid var(--line);background:#fbfcfb;white-space:nowrap}
  tbody td{padding:11px 16px;border-bottom:1px solid var(--line);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;background:var(--green-soft);color:var(--green-dark);font-size:12px;font-weight:600}
  .pill.gray{background:#f0f0f0;color:#999}
  .money{font-variant-numeric:tabular-nums;font-weight:600}
  .muted{color:var(--muted)}
  /* payments */
  .pay-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
    padding:14px 18px;border-bottom:1px solid var(--line)}
  .pay-stats{font-size:13px;color:var(--muted)}
  .pay-stats b{color:var(--ink)}
  .bar{height:10px;border-radius:999px;background:var(--green-soft);overflow:hidden;margin-top:8px;min-width:180px}
  .bar > span{display:block;height:100%;background:var(--green);border-radius:999px}
  .pay-row{display:flex;align-items:center;gap:13px;padding:12px 18px;border-bottom:1px solid var(--line)}
  .pay-row:last-child{border-bottom:none}
  .pay-row input{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex:none}
  .pay-row .nm{flex:1;font-weight:600}
  .pay-row.paid .nm{color:var(--muted);text-decoration:line-through}
  .pay-row .amt{font-variant-numeric:tabular-nums;font-weight:600;min-width:70px;text-align:right}
  .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
  .tag.y{background:var(--green-soft);color:var(--green-dark)}
  .tag.n{background:#fbf1e0;color:var(--amber)}
  .note{font-size:12.5px;color:var(--muted);padding:11px 18px;background:#fbfaf4;border-top:1px solid #efe9d6}
  .setup{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:var(--shadow)}
  .setup h2{margin:0 0 8px;font-size:18px}
  .setup ol{margin:10px 0 0;padding-left:20px}.setup li{margin:7px 0}
  .setup code{background:#f1f4f2;padding:1px 6px;border-radius:5px;font-size:12.5px}
  .err{background:#fdecec;border:1px solid #f5c6c6;color:#8a2b2b;padding:12px 16px;border-radius:12px;margin-bottom:16px;font-size:13.5px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--green-soft);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* editable foursomes */
  .f-intro{font-size:12.5px;color:var(--muted);padding:12px 18px;border-bottom:1px solid var(--line);background:#fbfcfb}
  .f-board{padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .f-group{border:1px solid var(--line);border-radius:13px;background:#fff;display:flex;flex-direction:column;overflow:hidden}
  .f-group.pool{background:var(--green-soft);border-style:dashed}
  .f-group.full .f-count{background:var(--green);color:#fff}
  .f-group.over .f-count{background:#b23a36;color:#fff}
  .f-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .f-group.pool .f-head{border-bottom-color:#cfe3d6}
  .f-title{flex:1;font-weight:650;font-size:14px;border:none;background:transparent;color:var(--ink);padding:2px 4px;border-radius:6px}
  .f-title:focus{outline:2px solid var(--green);background:#fff}
  .f-count{font-size:11px;color:var(--muted);background:#f0f3f1;border-radius:999px;padding:2px 8px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .f-list{list-style:none;margin:0;padding:9px;display:flex;flex-direction:column;gap:7px;flex:1;min-height:44px}
  .f-list.dragover{background:#dceee3;outline:2px dashed var(--green);outline-offset:-4px;border-radius:8px}
  .f-player{display:flex;align-items:center;gap:8px;background:#fbfdfc;border:1px solid var(--line);border-radius:9px;padding:7px 9px;cursor:grab}
  .f-player:active{cursor:grabbing}
  .f-player.dragging{opacity:.4}
  .f-player .grip{color:#bcc7c0;font-size:14px;line-height:1}
  .f-player .pinfo{flex:1;min-width:0}
  .f-player .pn{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .f-player .pn .star{color:var(--amber)}
  .f-player .pe{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .f-player .rm{border:none;background:transparent;color:#c2cbc5;cursor:pointer;font-size:14px;padding:1px 5px;border-radius:6px}
  .f-player .rm:hover{color:#b23a36;background:#f7e7e6}
  .f-open{display:flex;align-items:center;gap:8px;border:1px dashed var(--line);border-radius:9px;
    padding:7px 9px;color:#9aa7a0;font-size:12.5px;font-style:italic;background:#fcfdfd}
  .f-open .grip{color:#cdd6d0}
  .f-open .rm{margin-left:auto;border:none;background:transparent;color:#c2cbc5;cursor:pointer;font-size:13px;padding:1px 5px;border-radius:6px}
  .f-open .rm:hover{color:#b23a36;background:#f7e7e6}
  .f-foot{display:flex;gap:6px;padding:8px 11px;border-top:1px solid var(--line)}
  .f-group.pool .f-foot{border-top-color:#cfe3d6}
  .f-add{display:flex;gap:6px;width:100%}
  .f-add input{flex:1;border:1px solid var(--line);border-radius:7px;padding:5px 8px;font:inherit;font-size:12.5px}
  .f-add input:focus{outline:2px solid var(--green)}
  .f-del{margin-left:auto}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green-dark);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;
    opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:780px){.cards{grid-template-columns:repeat(2,1fr)}.hero{border-radius:0 0 16px 16px}}
</style>
</head>
<body>
<div class="hero">
  <div class="wrap" style="padding-bottom:0">
    <h1>⛳ Michael D Annual Golf Tournament 2026</h1>
    <div class="meta">
      <b>Monday, August 17, 2026</b> · 9:00 AM CST<br>
      Oak Park Country Club · 2001 N Thatcher Ave, River Grove, IL 60171<br>
      Payment via Venmo <b>@Trisha-Connolly</b> — registration isn't complete until paid.
    </div>
    <div class="updated"><span id="updated">Loading…</span><button id="refresh">↻ Refresh</button></div>
  </div>
</div>
<div class="wrap">
  <div id="errbox"></div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<!-- ====================================================================
     FOURSOME ARRANGEMENT SEED — your saved/published groupings.
     Empty by default: the page auto-assigns groups from the live sheet.
     The "Download site file" button rewrites everything between the SEED
     markers below with your current arrangement; commit that index.html
     to GitHub to publish a fixed set of groups. Don't hand-edit version.
     ==================================================================== -->
<script id="seed-data" type="application/json">
/*SEED_START*/
{
  "version": 1,
  "foursomes": [],
  "unassignedManual": []
}
/*SEED_END*/
</script>

<script>
/* ============================================================
   SETUP: paste your sheet's published-CSV link between the quotes.
   In Google Sheets: File -> Share -> Publish to web -> (the responses
   tab) -> Comma-separated values (.csv) -> Publish -> copy the URL.
   You can also pass it via the page URL: ...index.html?csv=PASTE_URL
   ============================================================ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMAm_RfEnMgwNnJ3mztqgI-rXMkgX4dZw5kiYuUD8yvU9GoyP4VvXanZfA5A04vCggXJAURv2_f6OG/pub?output=csv";
const TIERS = [
  { label:"Single Golfer", golfers:1, price:350 },
  { label:"Twosome",       golfers:2, price:700 },
  { label:"Foursome",      golfers:4, price:1400 }
];
const PAID_KEY = "golf_paid_v1";
const ARR_KEY  = "golf_foursomes_v1";
let PAID = {};
try { PAID = JSON.parse(localStorage.getItem(PAID_KEY) || "{}"); } catch(e){ PAID = {}; }
let ROWS = [];

const $ = id => document.getElementById(id);
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmt(n){ return "$" + (n||0).toLocaleString("en-US"); }
function csvUrl(){
  const q = new URLSearchParams(location.search).get("csv");
  return (q && q.trim()) || CSV_URL;
}

/* ---------- Foursome arrangement (auto-assigned, editable, persisted) ---------- */
function readSeed(){
  const raw = $("seed-data").textContent;
  const json = raw.replace("/*SEED_START*/","").replace("/*SEED_END*/","").trim();
  return JSON.parse(json);
}
const SEED = readSeed();
let ARR = loadArrangement();
function loadArrangement(){
  try{
    const s = JSON.parse(localStorage.getItem(ARR_KEY));
    if(s && typeof s.version==="number" && s.version >= SEED.version) return normalizeArr(s);
  }catch(e){}
  return normalizeArr(JSON.parse(JSON.stringify(SEED)));
}
function normalizeArr(a){
  a.foursomes = Array.isArray(a.foursomes)?a.foursomes:[];
  a.foursomes.forEach(f=>{ f.members=Array.isArray(f.members)?f.members:[]; if(typeof f.open!=="number") f.open=0; });
  a.unassignedManual = Array.isArray(a.unassignedManual)?a.unassignedManual:[];
  if(typeof a.version!=="number") a.version = SEED.version;
  return a;
}
function writeLocal(){ try{ localStorage.setItem(ARR_KEY, JSON.stringify(ARR)); }catch(e){} }
function saveArr(){ writeLocal(); render(); }
function nkOf(m){ return (m.email && m.email.trim()) ? m.email.toLowerCase().trim()
  : (m.name||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

/* ---------- CSV parsing ---------- */
function parseCSV(text){
  const rows=[]; let row=[], f="", i=0, q=false;
  while(i<text.length){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ f+='"'; i++; } else q=false; }
      else f+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(f); f=""; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(f); rows.push(row); row=[]; f=""; }
      else f+=c;
    }
    i++;
  }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows;
}
function pick(rec, res){ for(const k in rec){ for(const re of res) if(re.test(k)) return rec[k]; } return ""; }
function tierFor(label){ if(!label) return null; const L=label.toLowerCase();
  return TIERS.find(t=>L.includes(t.label.toLowerCase())||t.label.toLowerCase().includes(L)) || null; }
function parseGolfers(s){
  if(!s) return [];
  const t=s.trim();
  if(!t||/^tbd\.?$/i.test(t)||/^n\/?a$/i.test(t)||/^none$/i.test(t)) return [];
  return t.split(/[;,\n]+| and /i).map(e=>e.trim()).filter(Boolean).map(entry=>{
    let email=""; const em=entry.match(/[\w.+-]+@[\w.-]+\.\w+/); if(em) email=em[0];
    let name=entry.replace(/[|<>]/g," "); if(email) name=name.replace(email," ");
    name=name.replace(/\s+/g," ").trim();
    return { name, email };
  });
}
function buildRow(rec){
  const name = pick(rec,[/full name/,/^name/,/\bname\b/]) || "(unknown)";
  const email = pick(rec,[/e-?mail/]) || "";
  const sizeAns = pick(rec,[/how many/,/registering/,/golfers/]);
  const matchedTier = tierFor(pick(rec,[/package/,/tier/])) || tierFor(sizeAns);
  const attendAns = pick(rec,[/attend/]);
  const attending = attendAns ? !/\b(no|can'?t|cannot|sorry|won'?t|decline|unable|not)\b/i.test(attendAns) : true;
  const others = parseGolfers(pick(rec,[/other golfers/,/names? *(&|and) *emails/,/playing with/]));
  return {
    date: pick(rec,[/timestamp|^time|date/]) || "",
    name, email,
    tier: matchedTier ? matchedTier.label : (sizeAns||""),
    golfers: matchedTier ? matchedTier.golfers : 0,
    price: matchedTier ? matchedTier.price : 0,
    attending, others,
    key: (email||name).toLowerCase().trim()
  };
}

/* ---------- who is in the CSV but not yet placed ---------- */
function csvGolfers(att){
  const out=[], seen=new Set();
  att.forEach(r=>{
    [{name:r.name,email:r.email,cap:true}].concat(r.others||[]).forEach(m=>{
      if(!m || (!m.name && !m.email)) return;
      const nk=nkOf(m); if(seen.has(nk)) return; seen.add(nk);
      out.push({name:m.name||m.email, email:m.email||"", cap:!!m.cap, manual:false});
    });
  });
  return out;
}
function captainKeys(att){ const s=new Set(); att.forEach(r=>s.add(nkOf({name:r.name,email:r.email}))); return s; }
function placedNK(){ const s=new Set(); ARR.foursomes.forEach(f=>f.members.forEach(m=>s.add(nkOf(m)))); return s; }
function derivedUnassigned(att){
  const placed=placedNK();
  return csvGolfers(att).filter(g=>!placed.has(nkOf(g)));
}

/* ---------- auto-assign (party-aware bin packing into foursomes of 4) ---------- */
function partiesFrom(att){
  return att.map(r=>{
    const named=[{name:r.name,email:r.email,cap:true}].concat((r.others||[]).filter(o=>o&&(o.name||o.email)));
    const seen=new Set(), mem=[];
    named.forEach(m=>{ const nk=nkOf(m); if(!seen.has(nk)){ seen.add(nk); mem.push({name:m.name||m.email,email:m.email||"",manual:false}); } });
    const reserved=Math.max(r.golfers||0, mem.length, 1);
    return {members:mem, reserved};
  });
}
function autoAssignAll(att){
  const manual=[];
  ARR.foursomes.forEach(f=>f.members.forEach(m=>{ if(m.manual) manual.push(m); }));
  ARR.unassignedManual.forEach(m=>manual.push(m));
  const parties=partiesFrom(att).sort((a,b)=>b.reserved-a.reserved);
  const bins=[];
  parties.forEach(p=>{
    let bin=bins.find(b=>(4-b.used)>=p.reserved);
    if(!bin){ bin={used:0,members:[]}; bins.push(bin); }
    bin.members.push(...p.members); bin.used+=p.reserved;
  });
  ARR.foursomes=bins.map((b,i)=>({id:"f"+Math.random().toString(36).slice(2,8),name:"Foursome "+(i+1),
    members:b.members, open:Math.max(0,b.used-b.members.length)}));
  ARR.unassignedManual=manual;
  writeLocal();
}
function placeUnassigned(att){
  const pool=derivedUnassigned(att).map(m=>Object.assign({},m))
    .concat(ARR.unassignedManual.map(m=>Object.assign({},m)));
  ARR.unassignedManual=[];
  for(const f of ARR.foursomes){
    while((f.open||0)>0 && pool.length){ const m=pool.shift(); f.members.push(Object.assign({},m,{manual:!!m.manual})); f.open--; }
  }
  while(pool.length){
    const chunk=pool.splice(0,4);
    ARR.foursomes.push({id:"f"+Math.random().toString(36).slice(2,8),name:"Foursome "+(ARR.foursomes.length+1),
      members:chunk.map(m=>Object.assign({},m,{manual:!!m.manual})), open:Math.max(0,4-chunk.length)});
  }
  writeLocal();
}

/* ---------- move helpers ---------- */
function removeByNK(nk, att){
  for(const f of ARR.foursomes){
    const i=f.members.findIndex(m=>nkOf(m)===nk);
    if(i>-1){ const [m]=f.members.splice(i,1); return {m, manual:!!m.manual}; }
  }
  const j=ARR.unassignedManual.findIndex(m=>nkOf(m)===nk);
  if(j>-1){ const [m]=ARR.unassignedManual.splice(j,1); return {m, manual:true}; }
  const d=derivedUnassigned(att).find(m=>nkOf(m)===nk);
  if(d) return {m:d, manual:false};
  return null;
}
function addToContainer(cid, m, manual){
  if(cid==="pool"){ if(manual) ARR.unassignedManual.push(Object.assign({},m,{manual:true})); return; }
  const f=ARR.foursomes.find(x=>x.id===cid);
  if(f){ f.members.push(Object.assign({},m,{manual:!!manual})); if((f.open||0)>0) f.open--; }
}

/* ---------- data load ---------- */
async function load(){
  $("app").innerHTML = '<div class="setup"><span class="spin"></span> &nbsp;Loading RSVPs...</div>';
  $("errbox").innerHTML = "";
  const url = csvUrl();
  if(!url || /PASTE_PUBLISHED_CSV_URL_HERE/.test(url)){ renderSetup(); return; }
  try{
    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const table = parseCSV(text).filter(r => r.some(c => (c||"").trim() !== ""));
    if(!table.length) throw new Error("The sheet appears to be empty.");
    const headers = table[0].map(h => h.toLowerCase().trim());
    ROWS = table.slice(1).map(cells=>{
      const rec={}; headers.forEach((h,j)=>{ if(h) rec[h]=(cells[j]||"").trim(); });
      return buildRow(rec);
    }).filter(r => r.name && r.name !== "(unknown)");
    const att0 = ROWS.filter(r=>r.attending);
    if(!ARR.foursomes.length && att0.length){ autoAssignAll(att0); }   // auto-assign on first load
    render();
    $("updated").textContent = "Updated " + new Date().toLocaleString();
  }catch(e){
    $("updated").textContent = "";
    $("errbox").innerHTML = '<div class="err">Couldn\'t load the responses: ' + esc(e.message) +
      '. Make sure the sheet is <b>published to the web as CSV</b> and the link is correct.</div>';
    renderSetup();
  }
}
function setPaid(key, val){
  if(val) PAID[key]=1; else delete PAID[key];
  localStorage.setItem(PAID_KEY, JSON.stringify(PAID));
  render();
}

/* ---------- main render ---------- */
function render(){
  const att = ROWS.filter(r=>r.attending);
  const golfers = att.reduce((s,r)=>s+(r.golfers||0),0);
  const expected = att.reduce((s,r)=>s+(r.price||0),0);
  const collected = att.filter(r=>PAID[r.key]).reduce((s,r)=>s+(r.price||0),0);
  let html = "";
  html += '<div class="cards">' +
    card("RSVPs", att.length) +
    card("Golfers", golfers) +
    card("Foursomes", ARR.foursomes.length) +
    card("Expected", fmt(expected)) +
    card("Collected", fmt(collected), "good") +
  '</div>';
  html += '<h2 class="sec">Foursomes — auto-assigned, drag to adjust'+
    '<span class="sec-actions">'+
      '<button class="btn primary mini" id="autoAssign">⚡ Auto-assign all</button>'+
      '<button class="btn mini" id="placeUnassigned">Place unassigned</button>'+
      '<button class="btn mini" id="addFoursome">+ Foursome</button>'+
      '<button class="btn mini" id="resetArr">Reset</button>'+
      '<button class="btn gold mini" id="downloadSite">⬇ Download site file</button>'+
    '</span></h2>' + foursomesHtml(att);
  html += '<h2 class="sec">Payment checklist</h2>' + paymentsHtml(att, collected, expected);
  html += '<h2 class="sec">All responses</h2>' + tableHtml(ROWS);
  $("app").innerHTML = html;

  $("app").querySelectorAll("input[data-pay]").forEach(cb=>{
    cb.onchange = () => setPaid(cb.dataset.pay, cb.checked);
  });
  bindBoard(att);
}
function card(label, value, cls){
  return '<div class="card '+(cls||"")+'"><div class="label">'+label+'</div><div class="value">'+value+'</div></div>';
}

/* ---------- editable foursomes board ---------- */
function playerLi(m, capset){
  const nk=nkOf(m);
  const isCap = m.cap || (capset && capset.has(nk));
  return '<li class="f-player" draggable="true" data-nk="'+esc(nk)+'" data-manual="'+(m.manual?1:0)+'">'+
    '<span class="grip">⠿</span>'+
    '<span class="pinfo"><span class="pn">'+esc(m.name||m.email)+(isCap?' <span class="star">★</span>':'')+'</span>'+
    (m.email?'<span class="pe">'+esc(m.email)+'</span>':'')+'</span>'+
    '<button class="rm" title="Remove golfer" data-rm="'+esc(nk)+'">✕</button></li>';
}
function foursomesHtml(att){
  const capset=captainKeys(att);
  let cards="";
  ARR.foursomes.forEach(f=>{
    const open=f.open||0;
    const filled=f.members.length+open;
    let cls="f-group"; if(filled===4) cls+=" full"; if(filled>4) cls+=" over";
    let openRows="";
    for(let i=0;i<open;i++){
      openRows+='<li class="f-open"><span class="grip">○</span><span>— open spot —</span>'+
        '<button class="rm" title="Remove open spot" data-openminus="'+esc(f.id)+'">✕</button></li>';
    }
    cards+='<section class="'+cls+'" data-fid="'+esc(f.id)+'">'+
      '<div class="f-head"><input class="f-title" data-rename="'+esc(f.id)+'" value="'+esc(f.name)+'" spellcheck="false"/>'+
      '<span class="f-count">'+filled+' / 4</span></div>'+
      '<ul class="f-list" data-cid="'+esc(f.id)+'">'+ f.members.map(m=>playerLi(m,capset)).join("") + openRows +'</ul>'+
      '<div class="f-foot"><div class="f-add"><input placeholder="Add golfer name…" data-addto="'+esc(f.id)+'"/>'+
      '<button class="btn mini" data-addbtn="'+esc(f.id)+'">Add</button></div>'+
      '<button class="btn mini f-del" data-delfs="'+esc(f.id)+'">Delete</button></div>'+
    '</section>';
  });
  const pool = derivedUnassigned(att).concat(ARR.unassignedManual);
  cards+='<section class="f-group pool" data-fid="pool">'+
    '<div class="f-head"><input class="f-title" value="Unassigned golfers" readonly/>'+
    '<span class="f-count">'+pool.length+'</span></div>'+
    '<ul class="f-list" data-cid="pool">'+ pool.map(m=>playerLi(m,capset)).join("") +'</ul>'+
    '<div class="f-foot"><div class="f-add"><input placeholder="Add golfer name…" data-addto="pool"/>'+
    '<button class="btn mini" data-addbtn="pool">Add</button></div></div>'+
  '</section>';
  const intro='<div class="f-intro">Groups are <b>auto-assigned</b> from the responses (each paid party kept together, filled to four). '+
    'Drag any golfer to a different foursome or the <b>Unassigned</b> pool, rename a group by clicking its title, or add/remove names. '+
    'New RSVPs appear in Unassigned — hit <b>Place unassigned</b> to slot them in. '+
    'When it looks right, click <b>Download site file</b> and commit the new <code>index.html</code> to GitHub to publish.</div>';
  return '<div class="panel">'+intro+'<div class="f-board">'+cards+'</div></div>';
}
function bindBoard(att){
  $("app").querySelectorAll(".f-player").forEach(li=>{
    li.addEventListener("dragstart",e=>{ li.classList.add("dragging"); e.dataTransfer.setData("text/plain", li.dataset.nk); e.dataTransfer.effectAllowed="move"; });
    li.addEventListener("dragend",()=>li.classList.remove("dragging"));
  });
  $("app").querySelectorAll(".f-list").forEach(ul=>{
    ul.addEventListener("dragover",e=>{ e.preventDefault(); ul.classList.add("dragover"); });
    ul.addEventListener("dragleave",()=>ul.classList.remove("dragover"));
    ul.addEventListener("drop",e=>{
      e.preventDefault(); ul.classList.remove("dragover");
      const nk=e.dataTransfer.getData("text/plain");
      const taken=removeByNK(nk, att);
      if(taken){ addToContainer(ul.dataset.cid, taken.m, taken.manual); saveArr(); }
    });
  });
  $("app").querySelectorAll("[data-rm]").forEach(b=>{
    b.addEventListener("click",e=>{ e.stopPropagation();
      const t=removeByNK(b.dataset.rm, att);
      if(t){ toast("Removed "+(t.m.name||t.m.email)); saveArr(); }
    });
  });
  $("app").querySelectorAll("[data-rename]").forEach(inp=>{
    inp.addEventListener("change",()=>{ const f=ARR.foursomes.find(x=>x.id===inp.dataset.rename);
      if(f){ f.name=inp.value.trim()||f.name; saveArr(); } });
  });
  $("app").querySelectorAll("[data-addbtn]").forEach(btn=>{
    const cid=btn.dataset.addbtn;
    const inp=$("app").querySelector('[data-addto="'+cid+'"]');
    const go=()=>{ const name=(inp.value||"").trim(); if(!name) return;
      addToContainer(cid, {name:name,email:"",manual:true}, true); inp.value=""; saveArr(); };
    btn.addEventListener("click",go);
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  });
  $("app").querySelectorAll("[data-openminus]").forEach(b=>{
    b.addEventListener("click",()=>{ const f=ARR.foursomes.find(x=>x.id===b.dataset.openminus);
      if(f){ f.open=Math.max(0,(f.open||0)-1); saveArr(); } });
  });
  $("app").querySelectorAll("[data-delfs]").forEach(b=>{
    b.addEventListener("click",()=>{ const id=b.dataset.delfs; const f=ARR.foursomes.find(x=>x.id===id); if(!f) return;
      f.members.forEach(m=>{ if(m.manual) ARR.unassignedManual.push(m); });
      ARR.foursomes=ARR.foursomes.filter(x=>x.id!==id); toast("Foursome deleted"); saveArr();
    });
  });
  const aa=$("autoAssign"); if(aa) aa.onclick=()=>{
    if(confirm("Auto-assign all golfers into foursomes? This rebuilds the groups from the responses. Names you added by hand move to the Unassigned pool.")){
      autoAssignAll(ROWS.filter(r=>r.attending)); render(); toast("Groups auto-assigned");
    }
  };
  const pu=$("placeUnassigned"); if(pu) pu.onclick=()=>{ placeUnassigned(ROWS.filter(r=>r.attending)); render(); toast("Unassigned golfers placed"); };
  const add=$("addFoursome"); if(add) add.onclick=()=>{ ARR.foursomes.push({id:"f"+Math.random().toString(36).slice(2,8),name:"Foursome "+(ARR.foursomes.length+1),members:[],open:0}); saveArr(); };
  const reset=$("resetArr"); if(reset) reset.onclick=()=>{ if(confirm("Discard your local edits? If nothing is published yet, the groups auto-assign again from the responses.")){ localStorage.removeItem(ARR_KEY); ARR=normalizeArr(JSON.parse(JSON.stringify(SEED))); load(); toast("Reset"); } };
  const dl=$("downloadSite"); if(dl) dl.onclick=downloadSite;
}
function downloadSite(){
  const out={version:Date.now(), foursomes:ARR.foursomes, unassignedManual:ARR.unassignedManual};
  const newSeed="/*SEED_START*/\n"+JSON.stringify(out,null,2)+"\n/*SEED_END*/";
  let html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  html=html.replace(/\/\*SEED_START\*\/[\s\S]*?\/\*SEED_END\*\//, ()=>newSeed);
  const blob=new Blob([html],{type:"text/html"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="index.html";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  toast("Downloaded index.html — commit it to GitHub to publish");
}

/* ---------- payments + table ---------- */
function paymentsHtml(rows, collected, expected){
  if(!rows.length) return '<div class="panel"><div class="note">No registrations yet.</div></div>';
  const pct = expected ? Math.round(collected/expected*100) : 0;
  const paidCount = rows.filter(r=>PAID[r.key]).length;
  let html='<div class="panel"><div class="pay-head"><div class="pay-stats"><b>'+fmt(collected)+'</b> of '+fmt(expected)+
    ' collected · <b>'+paidCount+'</b> of '+rows.length+' groups paid<div class="bar"><span style="width:'+pct+'%"></span></div></div></div>';
  rows.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(r=>{
    const isPaid=!!PAID[r.key];
    html+='<div class="pay-row'+(isPaid?' paid':'')+'">'+
      '<input type="checkbox" data-pay="'+esc(r.key)+'"'+(isPaid?' checked':'')+' aria-label="Mark '+esc(r.name)+' paid">'+
      '<span class="nm">'+esc(r.name)+'</span>'+
      '<span class="pill">'+esc(r.tier)+'</span>'+
      '<span class="tag '+(isPaid?'y':'n')+'">'+(isPaid?'Paid':'Owes')+'</span>'+
      '<span class="amt">'+fmt(r.price)+'</span></div>';
  });
  html+='<div class="note">Check a box once their Venmo payment lands. These checkmarks are saved in <b>this browser</b>. (To share paid-status with everyone, add a "Paid" column in the sheet and tell me — I\'ll have the page read it.)</div></div>';
  return html;
}
function tableHtml(rows){
  if(!rows.length) return '<div class="panel"><div class="note">No responses yet.</div></div>';
  let html='<div class="panel"><table><thead><tr>'+
    '<th>Received</th><th>Name</th><th>Email</th><th>Package</th><th>Golfers</th><th>Amount</th><th>Playing with</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const d=r.date?String(r.date).split(" ")[0]:"";
    const others=(r.others||[]).map(o=>o.name||o.email).filter(Boolean).join(", ");
    const pkg = r.attending
      ? '<span class="pill">'+esc(r.tier||"—")+'</span>'
      : '<span class="pill gray">Can\'t make it</span>';
    html+='<tr style="'+(r.attending?'':'opacity:.55')+'">'+
      '<td class="muted">'+esc(d)+'</td>'+
      '<td><strong>'+esc(r.name)+'</strong></td>'+
      '<td class="muted">'+esc(r.email)+'</td>'+
      '<td>'+pkg+'</td>'+
      '<td>'+(r.attending&&r.golfers?r.golfers:'<span class="muted">—</span>')+'</td>'+
      '<td class="money">'+(r.attending&&r.price?fmt(r.price):'<span class="muted">—</span>')+'</td>'+
      '<td class="muted">'+esc(others||(r.attending?'—':''))+'</td>'+
    '</tr>';
  });
  return html+'</tbody></table></div>';
}
function renderSetup(){
  $("updated").textContent = "";
  $("app").innerHTML =
    '<div class="setup"><h2>One quick step to go live</h2>'+
    '<p class="muted" style="margin:0">This page reads your responses from a published copy of the Google Sheet. Set that up once:</p>'+
    '<ol>'+
    '<li>Open the <b>Michael D Annual Golf Tournament 2026 (Responses)</b> sheet.</li>'+
    '<li><b>File → Share → Publish to web</b>.</li>'+
    '<li>Pick the responses tab, choose <b>Comma-separated values (.csv)</b>, click <b>Publish</b>.</li>'+
    '<li>Copy the link (it looks like <code>https://docs.google.com/spreadsheets/d/e/…/pub?output=csv</code>).</li>'+
    '<li>Paste it into this file where it says <code>PASTE_PUBLISHED_CSV_URL_HERE</code> — or just send it to me and I\'ll set it for you.</li>'+
    '</ol></div>';
}
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2600);
}
$("refresh").onclick = load;
load();
</script>
